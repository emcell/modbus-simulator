name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: mkdir -p frontend/dist && echo '<html></html>' > frontend/dist/index.html
      - run: cargo clippy --all-targets --workspace -- -D warnings

  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install mbpoll + socat (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y mbpoll socat
      - name: Install mbpoll + socat (macOS)
        if: matrix.os == 'macos-latest'
        run: brew install mbpoll socat
      - name: Placeholder frontend dist
        shell: bash
        run: mkdir -p frontend/dist && echo '<html></html>' > frontend/dist/index.html
      # Only run the whole suite on Linux/macOS — Windows skips mbpoll/RTU/PTY
      # tests automatically (they're cfg(unix) or have_tool-gated).
      - run: cargo test --workspace

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install frontend deps
        working-directory: frontend
        run: npm ci
      - name: Typecheck + build
        working-directory: frontend
        run: npm run build
